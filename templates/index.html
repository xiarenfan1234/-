<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深度学习图片转铅笔画系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto}
        body{background:#f5f5f7;padding:40px 20px}
        .container{max-width:800px;margin:0 auto;background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.05)}
        h1{text-align:center;color:#1d1d1f;margin-bottom:32px;font-size:28px}
        .upload-box{border:2px dashed #d2d2d7;border-radius:12px;padding:40px;text-align:center}
        .upload-box h3{color:#1d1d1f;margin-bottom:20px;font-size:20px}
        .file-input{margin-bottom:20px}
        .btn{background:#0071e3;color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:16px;cursor:pointer}
        .btn:hover{background:#0077ed}
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 深度学习图片转铅笔画系统</h1>
        <div class="upload-box">
            <h3>选择图片上传</h3>
            <!-- 关键修复：表单明确POST提交，enctype正确 -->
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <div class="file-input">
                    <input type="file" name="file" accept="image/*" required>
                </div>
                <button type="submit" class="btn">生成铅笔画</button>
            </form>
        </div>
    </div>
</body>
</html>
